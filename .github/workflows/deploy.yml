name: Build & Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Required for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Prevent concurrent deployments from stepping on each other
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      # ── 1. Checkout source ──────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Inject secrets into HTML files ───────────────────────────────────
      # Uses a Python one-liner so there are no shell quoting edge-cases with
      # special characters that can appear in Apps Script URLs (/, =, +, etc.)
      - name: Inject APPS_SCRIPT_URL into index.html
        env:
          APPS_SCRIPT_URL: ${{ secrets.APPS_SCRIPT_URL }}
        run: |
          python3 - <<'PYEOF'
          import os, pathlib
          path = pathlib.Path('index.html')
          content = path.read_text(encoding='utf-8')
          content = content.replace('__APPS_SCRIPT_URL__', os.environ['APPS_SCRIPT_URL'])
          path.write_text(content, encoding='utf-8')
          print("✓ APPS_SCRIPT_URL injected into index.html")
          PYEOF

      - name: Inject LOGGER_URL into index.html
        env:
          LOGGER_URL: ${{ secrets.LOGGER_URL }}
        run: |
          python3 - <<'PYEOF'
          import os, pathlib
          path = pathlib.Path('index.html')
          content = path.read_text(encoding='utf-8')
          content = content.replace('__LOGGER_URL__', os.environ['LOGGER_URL'])
          path.write_text(content, encoding='utf-8')
          print("✓ LOGGER_URL injected into index.html")
          PYEOF

      - name: Inject GOOGLE_CLIENT_ID into index.html
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
        run: |
          python3 - <<'PYEOF'
          import os, pathlib
          path = pathlib.Path('index.html')
          content = path.read_text(encoding='utf-8')
          content = content.replace('__GOOGLE_CLIENT_ID__', os.environ['GOOGLE_CLIENT_ID'])
          path.write_text(content, encoding='utf-8')
          print("✓ GOOGLE_CLIENT_ID injected into index.html")
          PYEOF

      - name: Inject QUIZ_ENGINE_URL into quiz.html
        env:
          QUIZ_ENGINE_URL: ${{ secrets.QUIZ_ENGINE_URL }}
        run: |
          python3 - <<'PYEOF'
          import os, pathlib
          path = pathlib.Path('quiz.html')
          content = path.read_text(encoding='utf-8')
          content = content.replace('__QUIZ_ENGINE_URL__', os.environ['QUIZ_ENGINE_URL'])
          path.write_text(content, encoding='utf-8')
          print("✓ QUIZ_ENGINE_URL injected into quiz.html")
          PYEOF

      # ── 3. Safety check: no placeholders should remain ──────────────────────
      - name: Verify no placeholders remain
        run: |
          if grep -rn '__APPS_SCRIPT_URL__\|__LOGGER_URL__\|__QUIZ_ENGINE_URL__\|__GOOGLE_CLIENT_ID__' index.html quiz.html; then
            echo "❌ ERROR: Unreplaced placeholder found — check that all 4 secrets are set."
            exit 1
          fi
          echo "✓ All placeholders replaced successfully."

      # ── 4. Safety check: no raw Apps Script URLs in source tree ─────────────
      # (Catches accidental re-introduction of hardcoded URLs in future commits)
      - name: Verify no raw Apps Script URLs in source
        run: |
          if git grep -n 'script\.google\.com/macros/s/' -- '*.html' '*.js' '*.ts' 2>/dev/null; then
            echo "❌ ERROR: Raw Apps Script URL found in source files. Use __PLACEHOLDER__ instead."
            exit 1
          fi
          echo "✓ No raw Apps Script URLs in source."

      # ── 5. Upload the built site as a Pages artifact ────────────────────────
      - name: Setup GitHub Pages
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload the entire repo root (adjust if your site is in a subfolder)
          path: '.'

      # ── 6. Deploy ───────────────────────────────────────────────────────────
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
